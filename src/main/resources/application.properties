# Nuova configurazione DB Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/bookshare_db

spring.application.name=reshare
spring.datasource.username=postgresMaster
spring.datasource.password=goPostgresGo
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format-sql=true
app.security.whiteList=/register,/login,/market/item/{id},/market/user/{id}/item,/market,/market/categories,/market/cities
app.upload.dir=uploads/items